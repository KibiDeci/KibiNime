<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="styles.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  </head>
  <body>

    <!-- MOBILE NAV -->
    <div class="mobile-overlay sticky" id="mobileOverlay" onclick="closeMobileNav()"></div>
    <nav class="mobile-nav" id="mobileNav">
        <button class="close-nav" onclick="closeMobileNav()"><i class="fas fa-times"></i></button>
        <a href="#" class="logo">KibiNime</a>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#" style="color:var(--accent)">Register</a></li>
        </ul>
    </nav>

    <!-- NAVBAR -->
    <nav class="navbar-login sticky-top" id="navbar">
        <ul class="nav-links">
            <li><a href="index.html" class="active">Home</a></li>
        </ul>
        <a href="#" class="logo">KibiNime</a>
        <div class="nav-right1">
            <div class="hamburger" onclick="openMobileNav()">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <!-- HERO -->
     <section class="hero-login" id="hero">
        <div class="login">
            <h1>Login</h1>
        </div>

        <div class="login-section">
            <div class="login-box">
                <form>
                    <div class="user-box">
                        <input type="text" name="" required="">
                        <label>Username</label>
                    </div>
                    <div class="user-box">
                        <input type="password" name="" required="">
                        <label>Password</label>
                    </div>
                </form>
            </div>
            <div class="login-button1">
                <button>LOG IN</button>
            </div>
            <div class="forgot-section">
                <a href="">
                    Create Account
                </a>
                |
                <a href="">
                    Forgot Password?
                </a>
            </div>
        </div>
        
     </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
