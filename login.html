<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link href="login.css" rel="stylesheet" />
    <link href="styles.css" rel="stylesheet" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- MOBILE NAV -->
    <div class="mobile-overlay-login sticky" id="mobileOverlay" onclick="closeMobileNav()"></div>
    <nav class="mobile-nav" id="mobileNav">
        <button class="close-nav" onclick="closeMobileNav()"><i class="fas fa-times"></i></button>
        <a href="#" class="logo">KibiNime</a>
        <ul>
            <li><a href="login.html" style="color:var(--accent)">Home</a></li>
        </ul>
    </nav>

    <!-- NAVBAR -->
    <nav class="navbar-login sticky-top" id="navbar">
        <ul class="nav-links-login">
            <li><a href="index.html">Home</a></li>
        </ul>
        <a href="#" class="logo">KibiNime</a>
        <div class="nav-right-login">
            <div class="hamburger" onclick="openMobileNav()">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="login-section">
        <!--login-->
        <div class="login-section-tittle">
            <h1>Login</h1>
        </div>
        <!--Login Form-->
        <div class="form-login">
            <div class="field" style="animation: fadeUp 0.6s 0.05s ease both;">
                <label for="email">Email Address</label>
                <input type="email" id="email" autocomplete="email" />
                <div class="underline"></div>
            </div>
     
            <div class="field" style="animation: fadeUp 0.6s 0.12s ease both;">
                <label for="password">Password</label>
                <input type="password" id="password" autocomplete="current-password" />
                <div class="underline"></div>
            </div>

            <div class="login-button1">
              <button type="submit">Login</button>
            </div>

            <div class="forgot-register">
              <a href="" class="forgot-password">
                  Forgot Password?
              </a>
              |
              <a href="" class="register">
                  Create Account
              </a>
            </div>
        </div>
    </section>


    <script>
      src =
        "https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js";
      integrity =
        "sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI";
      crossorigin = "anonymous";
    </script>

    <footer>
      <div class="footer-bottom">
        <p>Copyright © 2026 KibiNime. All rights reserved.</p>
      </div>
    </footer>
    <script src="script.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script> 
  </body>
</html>
